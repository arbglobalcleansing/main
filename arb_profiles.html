<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARB Profiles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-connect.js"></script>
</head>
<body>

    <nav>
        <ul>
            <li><a href="mother_titles.html">Mother Titles</a></li>
            <li><a href="arb_profiles.html">ARB Profiles</a></li>
            <li><a href="land_holdings.html">Land Holdings</a></li>
            <li><a href="arb_tags.html">ARB Tags</a></li>
        </ul>
    </nav>

    <main>
        <h1>ARB Profiles</h1>
        <table border="1" id="arbProfilesTable">
            <thead>
                <tr>
                    <th>ARB ID</th>
                    <th>FB Name</th>
                    <th>Gender</th>
                    <th>Spouse</th>
                    <th>CLOA/Urban</th>
                    <th>Sequence No</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </main>

    <script>
        async function fetchArbProfiles() {
            const { data, error } = await supabase
                .from('arb_profiles')
                .select('*');

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            const tbody = document.querySelector('#arbProfilesTable tbody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.arb_id}</td>
                    <td>${row.fb_name}</td>
                    <td>${row.fb_gender}</td>
                    <td>${row.spouse}</td>
                    <td>${row.clorurban}</td>
                    <td>${row.sequence_no}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchArbProfiles;
    </script>
</body>
</html>
