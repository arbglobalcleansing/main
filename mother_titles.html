<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother Titles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-connect.js"></script>
</head>
<body>

    <nav>
        <ul>
            <li><a href="mother_titles.html">Mother Titles</a></li>
            <li><a href="arb_profiles.html">ARB Profiles</a></li>
            <li><a href="land_holdings.html">Land Holdings</a></li>
            <li><a href="arb_tags.html">ARB Tags</a></li>
        </ul>
    </nav>

    <main>
        <h1>Mother Titles</h1>
        <table border="1" id="motherTitlesTable">
            <thead>
                <tr>
                    <th>Mother Title No</th>
                    <th>Landowner</th>
                    <th>Municipality</th>
                    <th>Barangay</th>
                    <th>Split Status</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </main>

    <script>
        async function fetchMotherTitles() {
            const { data, error } = await supabase
                .from('mother_titles')
                .select('*');

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            const tbody = document.querySelector('#motherTitlesTable tbody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.mother_title_no}</td>
                    <td>${row.landowner}</td>
                    <td>${row.municipality}</td>
                    <td>${row.barangay}</td>
                    <td>${row.split_status}</td>
                    <td>${row.remarks}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchMotherTitles;
    </script>
</body>
</html>
