<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Holdings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-connect.js"></script>
</head>
<body>

    <nav>
        <ul>
            <li><a href="mother_titles.html">Mother Titles</a></li>
            <li><a href="arb_profiles.html">ARB Profiles</a></li>
            <li><a href="land_holdings.html">Land Holdings</a></li>
            <li><a href="arb_tags.html">ARB Tags</a></li>
        </ul>
    </nav>

    <main>
        <h1>Land Holdings</h1>
        <table border="1" id="landHoldingsTable">
            <thead>
                <tr>
                    <th>Claim No</th>
                    <th>Survey No</th>
                    <th>Lot No</th>
                    <th>Area</th>
                    <th>Type of Title</th>
                    <th>Date Distributed</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </main>

    <script>
        async function fetchLandHoldings() {
            const { data, error } = await supabase
                .from('land_holdings')
                .select('*');

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            const tbody = document.querySelector('#landHoldingsTable tbody');
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.claim_no}</td>
                    <td>${row.survey_no}</td>
                    <td>${row.lot_no}</td>
                    <td>${row.area}</td>
                    <td>${row.type_of_title}</td>
                    <td>${row.date_distributed}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchLandHoldings;
    </script>
</body>
</html>
